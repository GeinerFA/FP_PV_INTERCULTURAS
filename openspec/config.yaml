schema: spec-driven

context: |
  Tech stack: Next.js 16 App Router, React 19, TypeScript 5, pnpm, Tailwind CSS 4, next-intl.
  Architecture: src/ app router with [locale] segment, public/admin route groups, feature/service split, in-memory repository pattern.
  Testing: No test runner or coverage tool configured; lint and typecheck are available.
  Style: Strict TypeScript, @/* path alias, ESLint core-web-vitals/typescript, server-first components with minimal client boundaries.

strict_tdd: false

testing:
  detected: 2026-06-15
  test_runner:
    available: false
    command: ""
    framework: ""
  test_layers:
    unit:
      available: false
      tool: ""
    integration:
      available: false
      tool: ""
    e2e:
      available: false
      tool: ""
  coverage:
    available: false
    command: ""
  quality_tools:
    linter:
      available: true
      command: pnpm lint
    type_checker:
      available: true
      command: pnpm exec tsc --noEmit
    formatter:
      available: false
      command: ""

rules:
  proposal:
    - Anchor every change in the current Spanish-first MVP structure and localized routing.
    - Include rollback notes when a change touches routing, locale handling, or shared program services.
  specs:
    - Use Given/When/Then scenarios.
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
  design:
    - Document how the change fits the public/admin split and shared service layer.
    - Call out server/client component boundaries explicitly when interactivity is introduced.
  tasks:
    - Group tasks by vertical slice and keep each task finishable in one session.
    - Include tests or test-gap handling explicitly because the project currently has no runner.
  apply:
    - Follow the existing src/ structure, @/* imports, and locale-aware routing conventions.
    - Prefer server components; add client components only when hooks or browser APIs are required.
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: pnpm build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
